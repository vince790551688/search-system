<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DATA SEARCH SYSTEM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: transparent;
      --surface: rgba(255, 255, 255, 0.82);
      --surface2: rgba(255, 255, 255, 0.95);
      --border: #a8cce8;
      --accent: #1a6fb5;
      --text: #1a2a3a;
      --text-dim: #6a90b0;
      --danger: #c94444;
    }

    body {
      background: linear-gradient(160deg, #87CEEB 0%, #c9e8f7 40%, #e8f4fb 70%, #ffffff 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    header {
      border-bottom: 2px solid var(--accent);
      padding: 14px 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .title {
      font-size: 15px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 3px;
    }

    .container {
      max-width: 1700px;
      margin: 0 auto;
      padding: 22px 28px;
    }

    .search-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 20px;
    }

    .panel-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .search-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group label {
      font-size: 13px;
      color: #000000;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .field-group input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .field-group input:focus {
      border-color: var(--accent);
    }

    .search-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 22px;
      border: 1px solid;
      background: transparent;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-secondary {
      border-color: var(--border);
      color: var(--text-dim);
    }

    .btn-secondary:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .results-count {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    .results-count span {
      color: var(--accent);
    }

    .table-wrapper {
      border: 1px solid var(--border);
    }

    .table-scroll {
      max-height: 65vh;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      white-space: nowrap;
    }

    thead tr {
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid var(--accent);
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: normal;
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.95);
      z-index: 1;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: var(--surface2);
    }

    td {
      padding: 8px 14px;
      font-size: 12px;
      color: var(--text);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .state-box {
      text-align: center;
      padding: 60px;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .loading-animate {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .error-msg {
      color: var(--danger);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 8px 14px;
      border: 1px solid var(--danger);
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    th.sortable:hover {
      color: var(--text);
    }

    th .sort-arrow {
      margin-left: 5px;
      opacity: 0.4;
      font-style: normal;
    }

    th.sort-asc .sort-arrow,
    th.sort-desc .sort-arrow {
      opacity: 1;
      color: var(--accent);
    }

    .remark-cell {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 200px;
    }

    .remark-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-btn {
      flex-shrink: 0;
      padding: 2px 7px;
      font-size: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 1px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .copy-btn.copied {
      border-color: #2e9e5b;
      color: #2e9e5b;
    }

    .btn-copy-all {
      border-color: #2e9e5b;
      color: #2e9e5b;
    }

    .btn-copy-all:hover {
      background: #2e9e5b;
      color: #fff;
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
  <div style="background:rgba(255,255,255,0.88);border:1px solid #a8cce8;padding:40px 50px;min-width:320px;text-align:center;">
    <div style="font-size:15px;letter-spacing:5px;color:#1a6fb5;text-transform:uppercase;margin-bottom:8px;">DATA SEARCH SYSTEM</div>
    <div style="font-size:10px;letter-spacing:3px;color:#6a90b0;margin-bottom:30px;">// GOOGLE SHEETS QUERY INTERFACE</div>
    <div style="font-size:11px;letter-spacing:2px;color:#1a2a3a;text-align:left;margin-bottom:6px;font-weight:bold;">USER NAME</div>
    <input id="loginInput" type="text" placeholder="輸入用戶名..." onkeydown="if(event.key==='Enter')doLogin()"
      style="width:100%;background:#fff;border:1px solid #a8cce8;color:#1a2a3a;padding:9px 12px;font-family:'Courier New',monospace;font-size:13px;outline:none;margin-bottom:16px;">
    <div id="loginError" style="color:#c94444;font-size:11px;letter-spacing:1px;min-height:18px;margin-bottom:10px;"></div>
    <button onclick="doLogin()"
      style="width:100%;padding:10px;border:1px solid #1a6fb5;background:transparent;color:#1a6fb5;font-family:'Courier New',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;">
      LOGIN
    </button>
  </div>
</div>

<!-- Main App (hidden until login) -->
<div id="mainApp" style="display:none;">

<header>
  <div class="title">DATA SEARCH SYSTEM</div>
  <div class="subtitle">// GOOGLE SHEETS QUERY INTERFACE</div>
</header>

<div class="container">

  <div class="search-panel">
    <div class="panel-label">// SEARCH FILTERS</div>
    <div class="search-grid" id="searchGrid"></div>
    <div class="search-actions">
      <button class="btn btn-primary" onclick="search()">SEARCH</button>
      <button class="btn btn-secondary" onclick="clearAll()">CLEAR</button>
      <button class="btn btn-secondary" onclick="refresh()">REFRESH</button>
      <button class="btn btn-secondary" onclick="reloadData()" id="reloadBtn">重新抓取資料</button>
      <div id="errorMsg"></div>
    </div>
  </div>

  <div class="results-header">
    <div class="panel-label" style="margin:0">// RESULTS</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="btn btn-copy-all" onclick="copyAllRemarks()" id="copyAllBtn" style="display:none">COPY ALL 備註</button>
      <div class="results-count">RECORDS: <span id="countDisplay">—</span></div>
    </div>
  </div>

  <div class="table-wrapper">
    <div class="state-box" id="stateBox">ENTER SEARCH CRITERIA ABOVE</div>
    <div class="table-scroll" id="tableScroll" style="display:none">
      <table id="resultTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>
</div><!-- end mainApp -->

<script>
  const VALID_USER = 'vince1688';

  function doLogin() {
    const val = document.getElementById('loginInput').value.trim();
    if (val === VALID_USER) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
    } else {
      document.getElementById('loginError').textContent = 'USER NAME ERROR';
    }
  }

  const API_URLS = [
    'https://script.google.com/macros/s/AKfycbxd3HBOqRaszA-KVDwD6vkOBldslJpeZJ06fHZ93-QMqe54FxiIYmPd0JhQDMZrG5oS/exec',
    'https://script.google.com/macros/s/AKfycbwxquv-zONGmep-TSIoJPhVe2sj1XSLaLQOXWQ0Xx4h_O312VhxPSDRvNf3lYSS6utg/exec'
  ];

  const SEARCH_FIELDS = [
    { label: '会员',     keys: ['会员'] },
    { label: '姓名',     keys: ['姓名'] },
    { label: '銀行卡',   keys: ['銀行卡'] },
    { label: 'USDT地址', keys: ['USDT地址'] },
    { label: '购宝钱包', keys: ['购宝钱包'] },
    { label: '支付寶錢包', keys: ['USDT地址', '购宝钱包'] },
    { label: 'OKPAY',    keys: ['USDT地址', '购宝钱包'] },
    { label: 'K豆錢包',  keys: ['USDT地址', '购宝钱包'] },
    { label: 'MPAY',     keys: ['USDT地址', '购宝钱包'] },
    { label: '808電子錢包', keys: ['USDT地址', '购宝钱包'] },
    { label: 'TOpay錢包', keys: ['USDT地址', '购宝钱包'] },
    { label: 'JDPAY',    keys: ['USDT地址', '购宝钱包'] },
    { label: '設備唯一碼', keys: ['設備唯一碼'] },
    { label: 'IP',       keys: ['IP'] },
  ];

  const ALL_COLUMNS = [
    '平台', '会员', '投注彩种', '玩法', '原因', '姓名', '銀行卡', 'USDT地址', '购宝钱包', '設備唯一碼', 'IP', '備註'
  ];

  // Cache for all fetched data
  let cachedData = null;
  let currentParams = {};
  let currentData = [];
  let sortState = { col: null, dir: 1 };

  // Build search fields
  const grid = document.getElementById('searchGrid');
  SEARCH_FIELDS.forEach(({ label }) => {
    const div = document.createElement('div');
    div.className = 'field-group';
    div.innerHTML = `<label>${label}</label><input type="text" id="field_${label}" placeholder="...">`;
    grid.appendChild(div);
  });

  function getParams() {
    const params = {};
    SEARCH_FIELDS.forEach(({ label, keys }) => {
      const el = document.getElementById('field_' + label);
      const val = el ? el.value.trim() : '';
      if (val) params[label] = { val, keys };
    });
    return params;
  }

  function clearAll() {
    SEARCH_FIELDS.forEach(({ label }) => {
      const el = document.getElementById('field_' + label);
      if (el) el.value = '';
    });
    const stateBox = document.getElementById('stateBox');
    stateBox.style.display = 'block';
    stateBox.className = 'state-box';
    stateBox.textContent = 'ENTER SEARCH CRITERIA ABOVE';
    document.getElementById('tableScroll').style.display = 'none';
    document.getElementById('countDisplay').textContent = '—';
    document.getElementById('errorMsg').innerHTML = '';
  }

  function refresh() {
    cachedData = null;
    search();
  }

  async function reloadData() {
    const btn = document.getElementById('reloadBtn');
    btn.textContent = '抓取中...';
    btn.disabled = true;
    try {
      const results = await Promise.all(API_URLS.map(async url => {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        return Array.isArray(json) ? json : (json.data || []);
      }));
      cachedData = results.flat();
      btn.textContent = '✓ 抓取完成';
      setTimeout(() => { btn.textContent = '重新抓取資料'; btn.disabled = false; }, 1500);
    } catch (err) {
      cachedData = null;
      btn.textContent = '抓取失敗';
      setTimeout(() => { btn.textContent = '重新抓取資料'; btn.disabled = false; }, 2000);
    }
  }

  async function search() {
    const params = getParams();
    const errorEl = document.getElementById('errorMsg');
    errorEl.innerHTML = '';

    const stateBox = document.getElementById('stateBox');
    stateBox.style.display = 'block';
    stateBox.className = 'state-box loading-animate';
    stateBox.textContent = 'LOADING...';
    document.getElementById('tableScroll').style.display = 'none';
    document.getElementById('countDisplay').textContent = '—';

    try {
      // Fetch all APIs simultaneously, then cache combined results
      if (!cachedData) {
        const results = await Promise.all(API_URLS.map(async url => {
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const json = await res.json();
          return Array.isArray(json) ? json : (json.data || []);
        }));
        cachedData = results.flat();
      }

      // Client-side filtering (exact match, OR across fields, OR across comma-separated terms)
      currentParams = params;
      const filtered = cachedData.filter(row => {
        return Object.values(params).some(({ val, keys }) => {
          const terms = val.split(',').map(t => t.trim().toLowerCase()).filter(t => t);
          return keys.some(key => {
            const raw = String(row[key] ?? '').replace(/\r/g, '').replace(/[^\S\n]+/g, ' ');
            const tokens = raw.split('\n').map(t => t.trim().toLowerCase()).filter(t => t);
            return terms.some(t => tokens.some(token => token === t));
          });
        });
      });

      sortState = { col: null, dir: 1 };
      renderTable(filtered);
    } catch (err) {
      cachedData = null;
      stateBox.className = 'state-box';
      stateBox.textContent = 'ERROR';
      errorEl.innerHTML = `<div class="error-msg">FAILED: ${err.message}</div>`;
    }
  }

  function generateRemark(row) {
    const matchedFields = Object.entries(currentParams)
      .filter(([label, { val, keys }]) => {
        const terms = val.split(',').map(t => t.trim().toLowerCase()).filter(t => t);
        return keys.some(key => {
          const raw = String(row[key] ?? '').replace(/\r/g, '').replace(/[^\S\n]+/g, ' ');
          const tokens = raw.split('\n').map(t => t.trim().toLowerCase()).filter(t => t);
          return terms.some(t => tokens.some(token => token === t));
        });
      })
      .map(([label]) => label);
    if (matchedFields.length === 0) return '';
    const platform = row['平台'] || '';
    const member = row['会员'] || '';
    const reason = row['原因'] || '';
    return `與${platform} ${member} 同${matchedFields.join('、')}，原因: ${reason}`;
  }

  function sortTable(col) {
    if (sortState.col === col) {
      sortState.dir *= -1;
    } else {
      sortState.col = col;
      sortState.dir = 1;
    }
    const sorted = [...currentData].sort((a, b) => {
      const va = String(a[col] ?? '').toLowerCase();
      const vb = String(b[col] ?? '').toLowerCase();
      return va < vb ? -sortState.dir : va > vb ? sortState.dir : 0;
    });
    renderRows(sorted);
    renderHeaders();
  }

  function renderHeaders() {
    const thead = document.getElementById('tableHead');
    thead.innerHTML = '<tr>' + ALL_COLUMNS.map(col => {
      const isSort = sortState.col === col;
      const arrow = isSort ? (sortState.dir === 1 ? '▲' : '▼') : '⇅';
      const cls = isSort ? (sortState.dir === 1 ? 'sortable sort-asc' : 'sortable sort-desc') : 'sortable';
      return `<th class="${cls}" onclick="sortTable('${col}')">${col} <i class="sort-arrow">${arrow}</i></th>`;
    }).join('') + '</tr>';
  }

  function renderRows(data) {
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = data.map(row => {
      const cells = ALL_COLUMNS.map(col => {
        const val = col === '備註' ? row['__remark__'] || '' : (row[col] !== undefined && row[col] !== null ? String(row[col]) : '');
        const safe = val.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
        if (col === '備註') {
          return `<td><div class="remark-cell">${safe ? `<button class="copy-btn" onclick="copySingle(this,'${safe.replace(/'/g,"\\'")}')">複製</button>` : ''}<span class="remark-text" title="${safe}">${safe || '—'}</span></div></td>`;
        }
        return `<td title="${safe}">${safe || '—'}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
  }

  function renderTable(data) {
    const stateBox = document.getElementById('stateBox');
    const tableScroll = document.getElementById('tableScroll');

    document.getElementById('countDisplay').textContent = data.length;
    document.getElementById('copyAllBtn').style.display = 'none';

    if (data.length === 0) {
      stateBox.className = 'state-box';
      stateBox.style.display = 'block';
      stateBox.textContent = 'NO RECORDS FOUND';
      tableScroll.style.display = 'none';
      return;
    }

    // Pre-generate remarks and store in data
    currentData = data.map(row => ({ ...row, __remark__: generateRemark(row) }));

    stateBox.style.display = 'none';
    tableScroll.style.display = 'block';
    document.getElementById('copyAllBtn').style.display = '';

    renderHeaders();
    renderRows(currentData);
  }

  function copySingle(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 1500);
    });
  }

  function copyAllRemarks() {
    const remarks = currentData.map(r => r['__remark__']).filter(r => r);
    if (!remarks.length) return;
    navigator.clipboard.writeText(remarks.join('\n')).then(() => {
      const btn = document.getElementById('copyAllBtn');
      const orig = btn.textContent;
      btn.textContent = '✓ COPIED';
      setTimeout(() => { btn.textContent = orig; }, 1500);
    });
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>

</body>
</html>
