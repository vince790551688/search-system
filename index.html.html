<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DATA SEARCH SYSTEM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #d4a843;
      --text: #d8d8d8;
      --text-dim: #555;
      --danger: #c94444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    header {
      border-bottom: 2px solid var(--accent);
      padding: 14px 28px;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .title {
      font-size: 15px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 3px;
    }

    .container {
      max-width: 1700px;
      margin: 0 auto;
      padding: 22px 28px;
    }

    .search-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 20px;
    }

    .panel-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .search-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .field-group input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .field-group input:focus {
      border-color: var(--accent);
    }

    .search-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 22px;
      border: 1px solid;
      background: transparent;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-secondary {
      border-color: var(--border);
      color: var(--text-dim);
    }

    .btn-secondary:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .results-count {
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
    }

    .results-count span {
      color: var(--accent);
    }

    .table-wrapper {
      border: 1px solid var(--border);
    }

    .table-scroll {
      max-height: 65vh;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      white-space: nowrap;
    }

    thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--accent);
    }

    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: normal;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: var(--surface2);
    }

    td {
      padding: 8px 14px;
      font-size: 12px;
      color: var(--text);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .state-box {
      text-align: center;
      padding: 60px;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .loading-animate {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .error-msg {
      color: var(--danger);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 8px 14px;
      border: 1px solid var(--danger);
    }
  </style>
</head>
<body>

<header>
  <div class="title">DATA SEARCH SYSTEM</div>
  <div class="subtitle">// GOOGLE SHEETS QUERY INTERFACE</div>
</header>

<div class="container">

  <div class="search-panel">
    <div class="panel-label">// SEARCH FILTERS</div>
    <div class="search-grid" id="searchGrid"></div>
    <div class="search-actions">
      <button class="btn btn-primary" onclick="search()">SEARCH</button>
      <button class="btn btn-secondary" onclick="clearAll()">CLEAR</button>
      <button class="btn btn-secondary" onclick="refresh()">REFRESH</button>
      <div id="errorMsg"></div>
    </div>
  </div>

  <div class="results-header">
    <div class="panel-label" style="margin:0">// RESULTS</div>
    <div class="results-count">RECORDS: <span id="countDisplay">—</span></div>
  </div>

  <div class="table-wrapper">
    <div class="state-box" id="stateBox">ENTER SEARCH CRITERIA ABOVE</div>
    <div class="table-scroll" id="tableScroll" style="display:none">
      <table id="resultTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxd3HBOqRaszA-KVDwD6vkOBldslJpeZJ06fHZ93-QMqe54FxiIYmPd0JhQDMZrG5oS/exec';

  const SEARCH_FIELDS = [
    '会员', '姓名', '銀行卡', 'USDT地址', '购宝钱包', '設備唯一碼', 'IP'
  ];

  const ALL_COLUMNS = [
    '会员', '投注彩种', '玩法', '原因', '姓名', '銀行卡', 'USDT地址', '购宝钱包', '設備唯一碼', 'IP'
  ];

  // Cache for all fetched data
  let cachedData = null;

  // Build search fields
  const grid = document.getElementById('searchGrid');
  SEARCH_FIELDS.forEach(field => {
    const div = document.createElement('div');
    div.className = 'field-group';
    const id = 'field_' + field;
    div.innerHTML = `<label>${field}</label><input type="text" id="${id}" placeholder="...">`;
    grid.appendChild(div);
  });

  function getParams() {
    const params = {};
    SEARCH_FIELDS.forEach(field => {
      const el = document.getElementById('field_' + field);
      const val = el ? el.value.trim() : '';
      if (val) params[field] = val;
    });
    return params;
  }

  function clearAll() {
    SEARCH_FIELDS.forEach(field => {
      const el = document.getElementById('field_' + field);
      if (el) el.value = '';
    });
    const stateBox = document.getElementById('stateBox');
    stateBox.style.display = 'block';
    stateBox.className = 'state-box';
    stateBox.textContent = 'ENTER SEARCH CRITERIA ABOVE';
    document.getElementById('tableScroll').style.display = 'none';
    document.getElementById('countDisplay').textContent = '—';
    document.getElementById('errorMsg').innerHTML = '';
  }

  function refresh() {
    cachedData = null;
    search();
  }

  async function search() {
    const params = getParams();
    const errorEl = document.getElementById('errorMsg');
    errorEl.innerHTML = '';

    const stateBox = document.getElementById('stateBox');
    stateBox.style.display = 'block';
    stateBox.className = 'state-box loading-animate';
    stateBox.textContent = 'LOADING...';
    document.getElementById('tableScroll').style.display = 'none';
    document.getElementById('countDisplay').textContent = '—';

    try {
      // Fetch all data once, then cache
      if (!cachedData) {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        // Response is a plain array
        cachedData = Array.isArray(json) ? json : (json.data || []);
      }

      // Client-side filtering
      const filtered = cachedData.filter(row => {
        for (const key in params) {
          if (!params[key]) continue;
          const cellVal = String(row[key] ?? '').toLowerCase();
          const terms = params[key].split(',').map(t => t.trim().toLowerCase()).filter(t => t);
          if (!terms.some(t => cellVal.includes(t))) return false;
        }
        return true;
      });

      renderTable(filtered);
    } catch (err) {
      cachedData = null;
      stateBox.className = 'state-box';
      stateBox.textContent = 'ERROR';
      errorEl.innerHTML = `<div class="error-msg">FAILED: ${err.message}</div>`;
    }
  }

  function renderTable(data) {
    const stateBox = document.getElementById('stateBox');
    const tableScroll = document.getElementById('tableScroll');
    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');

    document.getElementById('countDisplay').textContent = data.length;

    if (data.length === 0) {
      stateBox.className = 'state-box';
      stateBox.style.display = 'block';
      stateBox.textContent = 'NO RECORDS FOUND';
      tableScroll.style.display = 'none';
      return;
    }

    stateBox.style.display = 'none';
    tableScroll.style.display = 'block';

    thead.innerHTML = '<tr>' + ALL_COLUMNS.map(c => `<th>${c}</th>`).join('') + '</tr>';

    tbody.innerHTML = data.map(row => {
      const cells = ALL_COLUMNS.map(col => {
        const val = row[col] !== undefined && row[col] !== null ? String(row[col]) : '';
        const safe = val.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
        return `<td title="${safe}">${safe || '—'}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });
</script>

</body>
</html>
